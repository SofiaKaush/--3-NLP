# Определяем стадии пайплайна: линтинг (проверка кода) и сборка Docker-образа
stages:
  - lint
  - build

# Глобальные переменные для Docker
variables:
  DOCKER_DRIVER: overlay2
  IMAGE_TAG: $CI_REGISTRY_IMAGE:$CI_COMMIT_REF_SLUG

# ─── Стадия 1: Проверка качества кода (Linting) ───────────────────────────
lint_python:
  image: python:3.10-slim
  stage: lint
  script:
    - pip install flake8
    # Проверяем код на критические синтаксические ошибки
    - flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

# ─── Стадия 2: Сборка и публикация Docker-образа ──────────────────────────
build_image:
  image: docker:20.10.16
  stage: build
  services:
    - docker:20.10.16-dind
  # Правило: запускать сборку только при пуше в ветку main
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
  script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - echo "Сборка Docker-образа..."
    - docker build -t $IMAGE_TAG .
    - echo "Публикация образа в реестр..."
    - docker push $IMAGE_TAG